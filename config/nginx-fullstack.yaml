# 1. The Dedicated Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: nginx-apps
  labels:
    istio.io/rev: asm-managed
---
# 2. The Statically Reserved External IP (Config Connector)
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeAddress
metadata:
  name: nginx-static-external-ip
  namespace: nginx-apps
  annotations:
    cnrm.cloud.google.com/project-id: "mcp-lud-wew"
spec:
  location: europe-west3
  addressType: EXTERNAL
---
# 3. The External Load Balancer (Kubernetes Service)
apiVersion: v1
kind: Service
metadata:
  name: nginx-external-lb
  namespace: nginx-apps
  annotations:
    networking.gke.io/load-balancer-ip-addresses: "nginx-static-external-ip"
spec:
  type: LoadBalancer
  selector:
    app: nginx
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
---
# 3.5 The Internal Test Service (Testing the new Service Range)
apiVersion: v1
kind: Service
metadata:
  name: nginx-internal-lb
  namespace: nginx-apps
spec:
  type: ClusterIP
  clusterIP: 34.118.224.100 
  selector:
    app: nginx
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
---
# 4. The Stable Application (Version 1)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-v1
  namespace: nginx-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
      version: v1
  template:
    metadata:
      labels:
        app: nginx
        version: v1
    spec:
      containers:
      - name: nginx
        image: nginx:1.24
        ports:
        - containerPort: 80
---
# 5. The Canary Application (Version 2)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-v2
  namespace: nginx-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
      version: v2
  template:
    metadata:
      labels:
        app: nginx
        version: v2
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
---
# 6. The Mesh Destination Rule (Defining the Subsets)
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: nginx-destinations
  namespace: nginx-apps
spec:
  host: nginx-internal-lb.nginx-apps.svc.cluster.local 
  subsets:
  - name: v1
    labels:
      version: v1
  - name: v2
    labels:
      version: v2
---
# 7. The Virtual Service
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: nginx-traffic-split
  namespace: nginx-apps
spec:
  hosts:
  - nginx-external-lb
  - nginx-external-lb.nginx-apps.svc.cluster.local
  http:
  - route:
    - destination:
        host: nginx-internal-lb.nginx-apps.svc.cluster.local
        subset: v1
      weight: 90
    - destination:
        host: nginx-internal-lb.nginx-apps.svc.cluster.local
        subset: v2
      weight: 10
